<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQmUD0PUNDkbj7Od4HhCFUIm35O9hUb2R2BYPL01GiberKeK-MJPdgVqiuxORXdoffEXFjM81Y-Qp0h/pub?gid=978665051&single=true&output=csv';

    // ฟังก์ชันนับจำนวนแยกหมวดหมู่
    async function updateCounts() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            let truckCount = 0;
            let trailerCount = 0;

            rows.forEach(row => {
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const type = columns[12]?.replace(/"/g, "").trim();   // คอลัมน์ M
                const status = columns[31]?.replace(/"/g, "").trim(); // คอลัมน์ AF

                if (status === "อนุมัติแล้ว") {
                    if (type === "หางพ่วง") {
                        trailerCount++;
                    } else {
                        truckCount++;
                    }
                }
            });

            document.getElementById('truck-count').innerText = truckCount.toLocaleString() + ' คัน';
            document.getElementById('trailer-count').innerText = trailerCount.toLocaleString() + ' คัน';
            
            // เปิดให้ปุ่มหางรถบรรทุกสามารถกดได้
            const trailerBtn = document.getElementById('trailer-btn');
            trailerBtn.classList.remove('opacity-60', 'grayscale');
            trailerBtn.classList.add('cursor-pointer');
        } catch (e) {
            console.error("Error updating counts:", e);
        }
    }

    // ฟังก์ชันแสดงผลแยกตามประเภท
    async function showItems(filterType) {
        document.getElementById('display-section').classList.remove('hidden');
        document.getElementById('display-section').scrollIntoView({ behavior: 'smooth' });
        
        const titleElement = document.getElementById('section-title');
        titleElement.innerText = filterType === "หางพ่วง" ? "รายการหางรถบรรทุกแนะนำ" : "รายการรถบรรทุกแนะนำ";
        
        const container = document.getElementById('truck-container');
        container.innerHTML = '<div class="col-span-full text-center py-20 text-blue-500 font-bold"><i class="fas fa-spinner fa-spin mr-2"></i> กำลังโหลดข้อมูล...</div>';

        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            let html = '';
            let found = 0;

            rows.forEach(row => {
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const brand = columns[11]?.replace(/"/g, "").trim(); 
                const type = columns[12]?.replace(/"/g, "").trim();   // คอลัมน์ M
                const status = columns[31]?.replace(/"/g, "").trim();

                // ตรวจสอบทั้งสถานะและประเภท
                const isMatch = (filterType === "หางพ่วง") ? (type === "หางพ่วง") : (type !== "หางพ่วง");

                if (status === "อนุมัติแล้ว" && isMatch) {
                    found++;
                    let imageUrl = "";
                    for (let i = 32; i <= 38; i++) {
                        let imgCandidate = columns[i]?.replace(/"/g, "").trim();
                        if (imgCandidate && imgCandidate !== "") {
                            imageUrl = imgCandidate;
                            break;
                        }
                    }

                    if (imageUrl.includes("drive.google.com")) {
                        let fileId = imageUrl.includes("id=") ? imageUrl.split("id=")[1].split("&")[0] : imageUrl.split("/d/")[1].split("/")[0];
                        imageUrl = `https://drive.google.com/uc?export=view&id=${fileId}`;
                    }

                    html += `
                        <div class="truck-card bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                            <div class="h-64 bg-slate-100 relative">
                                <img src="${imageUrl}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=กำลังเตรียมรูปภาพ'">
                                <div class="absolute top-5 right-5 bg-white/95 backdrop-blur px-4 py-1.5 rounded-full shadow-md">
                                    <span class="text-xs font-black text-green-600 uppercase tracking-widest">Verified</span>
                                </div>
                            </div>
                            <div class="p-8">
                                <div class="text-blue-600 font-bold text-xs mb-2 tracking-widest uppercase">${filterType === "หางพ่วง" ? "TRAILER" : "TRUCK"}</div>
                                <h3 class="text-2xl font-bold text-slate-800 mb-6">${brand}</h3>
                                <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition">
                                    ดูรายละเอียดเพิ่มเติม
                                </button>
                            </div>
                        </div>
                    `;
                }
            });

            container.innerHTML = found > 0 ? html : '<div class="col-span-full text-center py-20 text-slate-400 font-bold">ไม่พบรายการในขณะนี้</div>';
        } catch (error) {
            container.innerHTML = '<p class="col-span-full text-center text-red-500">เกิดข้อผิดพลาดในการดึงข้อมูล</p>';
        }
    }

    // เรียกนับจำนวนทันทีที่โหลดหน้าแรก
    updateCounts();
</script>
